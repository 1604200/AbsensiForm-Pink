<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Absensi Magang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing-page">
  <div class="page-transition"></div>

  <main class="landing-wrapper">
    <section class="hero-card glass reveal">
      <div class="hero-left">
        <p class="mini-label reveal delay-1">DOKUMEN KEHADIRAN</p>

        <h1 class="hero-title parallax" data-speed="2">ABSENSI</h1>

        <div class="arch-wrapper reveal delay-2">
          <div class="arch-shape"></div>
        </div>

        <h2 class="hero-subtitle reveal delay-3">MAGANG</h2>

        <div class="vertical-line reveal delay-4"></div>

        <p class="hero-caption reveal delay-5">SELAMA PKL DI AHM</p>

        <div class="hero-actions reveal delay-6">
  <a href="absensi.html" class="btn-enter magnetic">Buka Lembar Absensi</a>
</div>
      </div>

      <div class="hero-right">
        <div class="flower-scene parallax" data-speed="4">
          <div class="stem stem-1"></div>
          <div class="stem stem-2"></div>
          <div class="stem stem-3"></div>

          <div class="leaf leaf-1 float-slow"></div>
          <div class="leaf leaf-2 float-medium"></div>
          <div class="leaf leaf-3 float-fast"></div>
          <div class="leaf leaf-4 float-slow"></div>
          <div class="leaf leaf-5 float-medium"></div>

          <div class="bud bud-1 float-fast"></div>
          <div class="bud bud-2 float-slow"></div>
          <div class="bud bud-3 float-medium"></div>

          <div class="flower flower-1 bloom"></div>
          <div class="flower flower-2 bloom delay-bloom-1"></div>
          <div class="flower flower-3 bloom delay-bloom-2"></div>
        </div>
      </div>

      <div class="bg-orb orb-1"></div>
      <div class="bg-orb orb-2"></div>
      <div class="spark spark-1"></div>
      <div class="spark spark-2"></div>
      <div class="spark spark-3"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
